# Configuraš§es do Banco de Dados (Placeholder)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuraš§es de Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary (Placeholder)
cloudinary.api.cloudname=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.apikey=${CLOUDINARY_API_KEY}
cloudinary.api.apisecret=${CLOUDINARY_API_SECRET}

# Security (Placeholder)
api.security.token.secret=${JWT_SECRET}
